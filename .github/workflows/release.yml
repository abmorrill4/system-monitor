name: release

# Build, test, and publish a GitHub Release on every v* tag, and commit the
# CI-built binary back to main so the marketplace (which serves the committed
# bin/system-monitor.exe) ships the exact same artifact that the Release
# publishes and SHA256SUMS covers.
#
#   git tag v0.3.1 && git push origin v0.3.1
#
# Runs on windows-latest, which already has the MSVC toolchain, so no mingw
# setup is needed in CI. `workflow_dispatch` lets you refresh the committed
# binary on main without cutting a release.

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --locked

      - name: Build
        run: cargo build --release --locked

      - name: Commit binary to main (single source of truth)
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -f main
          mkdir -p bin
          cp target/release/system-monitor.exe bin/system-monitor.exe
          if git diff --quiet -- bin/system-monitor.exe; then
            echo "binary unchanged"
          else
            git add bin/system-monitor.exe
            git commit -m "ci: prebuilt binary for ${GITHUB_REF_NAME}"
            git push origin main
          fi

      - name: Package plugin
        shell: pwsh
        run: pwsh -File scripts/build-plugin.ps1

      - name: Stage assets + checksums
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item target/release/system-monitor.exe release-assets/system-monitor-windows-x64.exe
          Copy-Item dist/system-monitor.plugin release-assets/system-monitor.plugin
          Get-FileHash release-assets/* -Algorithm SHA256 |
            ForEach-Object { '{0}  {1}' -f $_.Hash.ToLower(), (Split-Path $_.Path -Leaf) } |
            Set-Content release-assets/SHA256SUMS.txt
          Get-Content release-assets/SHA256SUMS.txt

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
